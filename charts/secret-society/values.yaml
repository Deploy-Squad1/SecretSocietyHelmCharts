ecrCredsSecret: awsecr-cred

frontend:
  name: frontend
  
  deployment:
    replicaCount: 1
    image:
      repository: 983988120210.dkr.ecr.eu-north-1.amazonaws.com/frontend-service
      tag: latest
    resources:
      limits:
        memory: "256Mi"
        cpu: "500m"
      requests:
        memory: "128Mi"
        cpu: "250m"

  service:
    type: ClusterIP
    port: 80

  gateway:
    name: main-gateway
    class: nginx
    listeners:
    - name: http
      protocol: HTTP
      port: 80

  httpRoute:
    rules:
    - matches:
      - path:
          type: PathPrefix
          value: /

core:
  name: core

  deployment:
    replicaCount: 1
    image:
      repository: 983988120210.dkr.ecr.eu-north-1.amazonaws.com/core-service
      tag: latest
    lifecycle:
      postStart:
        command:
          - python
          - manage.py
          - migrate
    resources:
      limits:
        memory: "512Mi"
        cpu: "500m"
      requests:
        memory: "256Mi"
        cpu: "250m"

  service:
    type: ClusterIP
    port: 8000

  configMap:
    name: core-env
    data:
      DEBUG: "True"
      DB_HOST: "db"
      DB_PORT: "5432"
      ALLOWED_HOSTS: "http://example.com"
      FRONTEND_SERVICE_URL: "http://example.com"
      EMAIL_SERVICE_URL: "http://example.com"
      MAP_SERVICE_BASE_URL: "http://example.com"
      VOTING_SERVICE_URL: "http://example.com"

  secret:
    name: core-secret

  gateway:
    name: main-gateway

  httpRoute:
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /core/api/v1