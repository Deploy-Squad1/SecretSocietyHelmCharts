apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.core.configMap.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.core.name }}
    {{- include "secret-society.labels" . | nindent 4 }}
data:
  DEBUG: {{ .Values.core.configMap.data.DEBUG | quote }}
  DB_HOST: {{ .Values.core.configMap.data.DB_HOST | quote }}
  DB_PORT: {{ .Values.core.configMap.data.DB_PORT | quote }}
  ALLOWED_HOSTS: {{ .Values.core.configMap.data.ALLOWED_HOSTS | quote }}
  FRONTEND_SERVICE_URL: {{ .Values.core.configMap.data.FRONTEND_SERVICE_URL | quote }}
  EMAIL_SERVICE_URL: {{ .Values.core.configMap.data.EMAIL_SERVICE_URL | quote }}
  MAP_SERVICE_BASE_URL: {{ .Values.core.configMap.data.MAP_SERVICE_BASE_URL | quote }}
  VOTING_SERVICE_URL: {{ .Values.core.configMap.data.VOTING_SERVICE_URL | quote }}