apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ .Values.map.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.map.name }}
    {{- include "secret-society.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.frontend.gateway.name }}
  rules:
    {{- range .Values.map.httpRoute.rules }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- end }}
      backendRefs:
      - name: {{ .Values.map.name }}
        port: {{ .Values.map.service.port }}
