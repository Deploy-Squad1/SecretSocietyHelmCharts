apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.map.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.map.name }}
    {{- include "secret-society.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.map.deployment.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.map.name }}
      {{- include "secret-society.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.map.name }}
        {{- include "secret-society.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.map.name }}
          image: "{{ .Values.map.deployment.image.repository }}:{{ .Values.map.deployment.image.tag }}"
          envFrom:
            - configMapRef:
                name: {{ .Values.map.configMap.name }}
            - secretRef:
                name: {{ .Values.map.deployment.secretRef }}
          {{- with .Values.map.deployment.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.map.service.port }}
      imagePullSecrets:
        - name: {{ .Values.ecrCredsSecret }}
