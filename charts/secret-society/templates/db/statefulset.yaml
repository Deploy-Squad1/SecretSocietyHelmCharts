apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  labels:
    app.kubernetes.io/name: db
    {{- include "secret-society.labels" . | nindent 4 }}
spec:
  serviceName: db
  selector:
    matchLabels:
      app.kubernetes.io/name: db
      {{- include "secret-society.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db
        {{- include "secret-society.labels" . | nindent 8 }}
    spec:
      containers:
        - name: db
          image: {{ .Values.db.image | quote }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.db.env.POSTGRES_DB | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.db.env.POSTGRES_USER | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.db.env.POSTGRES_PASSWORD | quote }}
          resources:
            limits:
              memory: {{ .Values.db.resources.limits.memory | quote }}
              cpu: {{ .Values.db.resources.limits.cpu | quote }}
            requests:
              memory: {{ .Values.db.resources.requests.memory | quote }}
              cpu: {{ .Values.db.resources.requests.cpu | quote }}
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: db-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.db.storage | quote }}