apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ .Values.voting.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.voting.name }}
    {{- include "secret-society.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.frontend.gateway.name }}
  rules:
    {{- range .Values.voting.httpRoute.rules }}
    {{- with .matches }}
    - matches:
      {{- toYaml . | nindent 8 }}
    {{- end }}
      backendRefs:
        - name: {{ $.Values.voting.name }}
          port: {{ $.Values.voting.service.port }}
    {{- end }}
