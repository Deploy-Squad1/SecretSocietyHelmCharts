apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.voting.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.voting.name }}
    {{- include "secret-society.labels" . | nindent 4 }}
spec:
  type: {{ .Values.voting.service.type }}
  selector:
    app.kubernetes.io/name: {{ .Values.voting.name }}
    {{- include "secret-society.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.voting.service.port }}
      targetPort: {{ .Values.voting.service.port }}
